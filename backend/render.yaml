services:
  - type: web
    name: gyaanseetu-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true        # Render auto-generates a secure random value
      - key: DATABASE_URL
        fromDatabase:
          name: gyaanseetu-db
          property: connectionString
      - key: FRONTEND_URL
        value: https://gyaanseetu.vercel.app   # Update this AFTER you get your Vercel URL

databases:
  - name: gyaanseetu-db
    databaseName: gyaanseetu
    plan: free
