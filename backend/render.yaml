services:
  - type: web
    name: gyansetu-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true        # Render auto-generates a secure random value
      - key: DATABASE_URL
        fromDatabase:
          name: gyansetu-db
          property: connectionString
      - key: FRONTEND_URL
        value: https://gyansetu.vercel.app   # Update this AFTER you get your Vercel URL

databases:
  - name: gyansetu-db
    databaseName: gyansetu
    plan: free
